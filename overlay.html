<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Select area</title>
    <style>
      :root { font-family: Inter, -apple-system, system-ui, sans-serif; }
      * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; cursor: none; }
      html, body {
        width: 100vw; height: 100vh; overflow: hidden;
        cursor: none; background: rgba(0,0,0,0.28);
      }
      #toolbar button, #toolbar button * { cursor: pointer; }
      /* synthetic crosshair, cursor-sized (reliable regardless of key-window state) */
      #chV, #chH {
        position: fixed; background: rgba(255,255,255,.95); pointer-events: none; z-index: 50; display: none;
        box-shadow: 0 0 0 .5px rgba(0,0,0,.55);
      }
      #chV { width: 1.5px; height: 20px; }
      #chH { height: 1.5px; width: 20px; }
      body.cross #chV, body.cross #chH { display: block; }
      #hint {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
        color: #fff; font-size: 15px; font-weight: 500; letter-spacing: .2px;
        background: rgba(20,20,22,.78); padding: 12px 18px; border-radius: 10px;
        box-shadow: 0 8px 30px rgba(0,0,0,.4); pointer-events: none;
        backdrop-filter: blur(8px);
      }
      /* the selection rectangle is a transparent hole with a bright border */
      #sel {
        position: fixed; display: none; border: 2px solid #513DE5;
        box-shadow: 0 0 0 9999px rgba(0,0,0,0.28), 0 0 0 1px rgba(255,255,255,.4) inset;
        background: rgba(81,61,229,0.06);
      }
      #dims {
        position: absolute; top: -24px; left: 0; font-size: 11px; color: #fff;
        background: #513DE5; padding: 2px 7px; border-radius: 5px; font-weight: 600;
        white-space: nowrap; font-variant-numeric: tabular-nums;
      }
      #toolbar {
        position: fixed; display: none; gap: 8px; align-items: center;
        left: 50%; bottom: 40px; transform: translateX(-50%);
        background: rgba(20,20,22,.92); padding: 8px; border-radius: 14px;
        box-shadow: 0 10px 40px rgba(0,0,0,.5); backdrop-filter: blur(12px); z-index: 10;
      }
      #toolbar button {
        font-family: inherit; font-size: 13px; font-weight: 600; color: #fff;
        border: none; border-radius: 9px; padding: 9px 18px; cursor: pointer;
      }
      #rec { background: #ef4444; }
      #rec:hover { background: #dc2626; }
      #reselect { background: rgba(255,255,255,.12); }
      #reselect:hover { background: rgba(255,255,255,.2); }
      #cancel { background: rgba(255,255,255,.12); }
      #cancel:hover { background: rgba(255,255,255,.2); }
      #toolbar kbd {
        margin-left: 7px; padding: 1px 6px; font-family: inherit; font-size: 11px; font-weight: 700;
        color: rgba(255,255,255,.9); background: rgba(255,255,255,.2);
        border: 1px solid rgba(255,255,255,.28); border-radius: 5px;
      }
      #countdown {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
        display: none; font-size: 160px; font-weight: 800; color: #fff;
        text-shadow: 0 4px 40px rgba(0,0,0,.6); font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div id="chV"></div>
    <div id="chH"></div>
    <div id="hint">Drag to select an area · Esc to cancel</div>
    <div id="sel"><span id="dims"></span></div>
    <div id="toolbar">
      <button id="rec">● Record <kbd>⇧↵</kbd></button>
      <button id="reselect">Reselect area</button>
      <button id="cancel">Cancel <kbd>esc</kbd></button>
    </div>
    <div id="countdown"></div>
    <script type="module" src="/src/overlay.js"></script>
  </body>
</html>
