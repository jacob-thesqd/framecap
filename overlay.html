<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Select area</title>
    <style>
      :root { font-family: Inter, -apple-system, system-ui, sans-serif; }
      * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
      html, body { width: 100vw; height: 100vh; overflow: hidden; background: transparent; }

      /* crosshair (while creating a selection) */
      body.idle, body.idle *, body.creating, body.creating * { cursor: none; }
      /* white line + solid black outline → visible on both light and dark backgrounds */
      #chV, #chH { position: fixed; background: #fff; pointer-events: none; z-index: 80; display: none; box-shadow: 0 0 0 1px #000; }
      #chV { width: 2px; height: 22px; }
      #chH { height: 2px; width: 22px; }
      body.idle #chV, body.idle #chH, body.creating #chV, body.creating #chH { display: block; }

      #hint {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
        color: #fff; font-size: 15px; font-weight: 500; background: rgba(20,20,22,.78);
        padding: 12px 18px; border-radius: 10px; pointer-events: none; backdrop-filter: blur(8px); display: none;
      }
      body.idle #hint { display: block; }

      /* selection box: clear interior, subtle grey dim outside */
      #sel {
        position: fixed; display: none; border: 1px solid rgba(255,255,255,.9);
        box-shadow: 0 0 0 100vmax rgba(60,60,60,.45);
      }
      body.creating #sel, body.ready #sel { display: block; }
      body.ready #sel { cursor: move; }

      /* rule-of-thirds grid (only when ready) */
      .grid { position: absolute; pointer-events: none; display: none; }
      .grid.v { width: 0; height: 100%; top: 0; border-left: 1px dashed rgba(255,255,255,.45); }
      .grid.h { height: 0; width: 100%; left: 0; border-top: 1px dashed rgba(255,255,255,.45); }
      body.ready .grid { display: block; }

      /* resize handles */
      .handle { position: absolute; width: 11px; height: 11px; border-radius: 50%; background: #111; border: 2px solid #fff; box-shadow: 0 1px 3px rgba(0,0,0,.5); display: none; z-index: 70; }
      body.ready .handle { display: block; }
      .h-nw { top: -6px; left: -6px; cursor: nwse-resize; }
      .h-ne { top: -6px; right: -6px; cursor: nesw-resize; }
      .h-sw { bottom: -6px; left: -6px; cursor: nesw-resize; }
      .h-se { bottom: -6px; right: -6px; cursor: nwse-resize; }
      .h-n { top: -6px; left: 50%; transform: translateX(-50%); cursor: ns-resize; }
      .h-s { bottom: -6px; left: 50%; transform: translateX(-50%); cursor: ns-resize; }
      .h-w { left: -6px; top: 50%; transform: translateY(-50%); cursor: ew-resize; }
      .h-e { right: -6px; top: 50%; transform: translateY(-50%); cursor: ew-resize; }

      /* control panel (size/position + actions) */
      #control {
        position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%); display: none;
        flex-direction: column; gap: 8px; background: rgba(20,20,22,.95); padding: 12px 14px;
        border-radius: 14px; backdrop-filter: blur(12px); z-index: 90;
      }
      body.ready #control { display: flex; }
      .crow { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 12px; font-variant-numeric: tabular-nums; }
      .crow label { color: rgba(255,255,255,.55); min-width: 52px; }
      .crow input { width: 60px; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); color: #fff; border-radius: 6px; padding: 5px 7px; font-family: inherit; font-size: 12px; text-align: center; }
      .crow .sep, .crow .unit { color: rgba(255,255,255,.4); }
      .btns { display: flex; gap: 8px; justify-content: center; margin-top: 2px; }
      .btns button { font-family: inherit; font-size: 13px; font-weight: 600; color: #fff; border: none; border-radius: 9px; padding: 9px 16px; cursor: pointer; }
      #rec { background: #ef4444; } #rec:hover { background: #dc2626; }
      #reselect, #cancel { background: rgba(255,255,255,.12); } #reselect:hover, #cancel:hover { background: rgba(255,255,255,.2); }
      kbd { margin-left: 6px; padding: 1px 6px; font-family: inherit; font-size: 11px; font-weight: 700; background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.28); border-radius: 5px; }

      #countdown { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); display: none; font-size: 160px; font-weight: 800; color: #fff; text-shadow: 0 4px 40px rgba(0,0,0,.6); }
    </style>
  </head>
  <body class="idle">
    <div id="chV"></div>
    <div id="chH"></div>
    <div id="hint">Drag to select an area · Esc to cancel</div>

    <div id="sel">
      <div class="grid v" style="left:33.333%"></div>
      <div class="grid v" style="left:66.666%"></div>
      <div class="grid h" style="top:33.333%"></div>
      <div class="grid h" style="top:66.666%"></div>
      <div class="handle h-nw" data-h="nw"></div>
      <div class="handle h-n" data-h="n"></div>
      <div class="handle h-ne" data-h="ne"></div>
      <div class="handle h-e" data-h="e"></div>
      <div class="handle h-se" data-h="se"></div>
      <div class="handle h-s" data-h="s"></div>
      <div class="handle h-sw" data-h="sw"></div>
      <div class="handle h-w" data-h="w"></div>
    </div>

    <div id="control">
      <div class="crow">
        <label>Size</label>
        <input id="inW" type="number" min="1" /> <span class="sep">×</span> <input id="inH" type="number" min="1" /> <span class="unit">px</span>
      </div>
      <div class="crow">
        <label>Position</label>
        <input id="inX" type="number" /> <input id="inY" type="number" /> <span class="unit">px</span>
      </div>
      <div class="btns">
        <button id="rec">● Record <kbd>⇧↵</kbd></button>
        <button id="reselect">Reselect</button>
        <button id="cancel">Cancel <kbd>esc</kbd></button>
      </div>
    </div>

    <div id="countdown"></div>
    <script type="module" src="/src/overlay.js"></script>
  </body>
</html>
