<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Recording area</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100vw; height: 100vh; background: transparent; overflow: hidden; }
      /* #hole is the exact capture rect: transparent interior (captured clean),
         a thin accent outline just outside it, and a subtle grey dim over the
         rest of the screen via a huge outset box-shadow */
      #hole {
        position: absolute; border-radius: 2px;
        box-shadow: 0 0 0 100vmax rgba(60, 60, 60, 0.22);
      }
    </style>
  </head>
  <body>
    <div id="hole"></div>
    <script>
      const p = new URLSearchParams(location.search);
      const h = document.getElementById("hole");
      h.style.left = (p.get("x") || 0) + "px";
      h.style.top = (p.get("y") || 0) + "px";
      h.style.width = (p.get("w") || 0) + "px";
      h.style.height = (p.get("h") || 0) + "px";
    </script>
  </body>
</html>
